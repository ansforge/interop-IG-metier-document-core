# Documentation à propos de cette page : https://fshschool.org/docs/sushi/configuration/

id: ans.fr.document-core
canonical: https://interop.esante.gouv.fr/ig/document-core # the last part of canonical and id must be the same
name: FRDocumentCore # Should be an acronym
title: FR Document Core (Modèle métier)
description: Volet modèle métier du guide d'implémentation Document Core.
publisher:
  name: Agence du Numérique en Santé (ANS) - 2-10 Rue d'Oradour-sur-Glane, 75015 Paris
  url: https://esante.gouv.fr
status: draft
version: 0.1.0 # shall conforms to Semantic Versioning https://fr.wiktionary.org/wiki/SemVer
fhirVersion: 4.0.1
copyrightYear: 2020+
releaseLabel: ci-build # le release label doit être conforme au cycle de vie de la doctrine du ci-sis. Cf. https://interop.esante.gouv.fr/ig/documentation/mod_bonnes_pratiques.html#release-dun-ig-fhir colonne "label de publication"

jurisdiction: urn:iso:std:iso:3166#FR "France (la)"

parameters: #Parameters list - https://build.fhir.org/ig/FHIR/fhir-tools-ig/CodeSystem-ig-parameters.html
    shownav: 'true'
    path-expansion-params: '../../expansion-params.json' # for using French SNOMED CT Extension
    pin-canonicals: pin-all
    apply-contact: true
    logging:
      - tx #tx: Messages describing the use of the terminology server (for debugging)
      - html #html: Log when validating an html page (troubleshooting only - leave off)
      - generate #generate: Log when producing an individual resource (troubleshooting only - leave off)
      - init #init: Messages describing the start up process (for debugging)
      - progress #progress: Overall progress messages
    i18n-default-lang: fr # Default language
    apply-jurisdiction: true
    i18n-lang:
      - en
    translation-sources:
      - input/translations/en

dependencies:
  ans.fr.terminologies: latest
  ans.fhir.fr.document-core: current
  ans.cda.fr.document-core: current


pages:
    index.md:
        title: Accueil
    structureGenerale.md:
        title: Structure générale document
        introduction.md:
            title: Introduction
        exigencesSpecifiques.md:
            title: Exigences spécifiques
        mappingCDA-FHIR-struc-gen.md:
            title: Mapping CDA / FHIR
    enteteDocument.md:
        title: Entête document
        mappingCDA-FHIR-entete.md:
            title: Mapping Métier/CDA/FHIR
    corpsDocument.md:
        title: Corps d'un document
        mappingCDA-FHIR-corps.md:
            title: Mapping Métier/CDA/FHIR
    autres_ressources.md:
        title: Autres Ressources
        securite.md:
            title: Sécurité
        downloads.md:
            title: Téléchargements et usages
    translationinfo.md:
        title: Informations sur la traduction

menu:
    Accueil: index.html
    Structure générale document:
        Introduction: introduction.html
        Exigences spécifiques: exigencesSpecifiques.html
        CDA: new-tab https://interop.esante.gouv.fr/ig/cda/document-core/ressourcesCDA-struc-gen.html
        FHIR: new-tab https://interop.esante.gouv.fr/ig/fhir/document-core/ressourcesFHIR-struc-gen.html
        Mapping CDA / FHIR: mappingCDA-FHIR-struc-gen.html
    Entête document:
        Modèle logique métier: StructureDefinition-fr-lm-header-document.html
        CDA: new-tab https://interop.esante.gouv.fr/ig/cda/document-core/ressourcesCDA-entete.html
        FHIR: new-tab https://interop.esante.gouv.fr/ig/fhir/document-core/ressourcesFHIR-entete.html
        Mapping Métier/CDA/FHIR: mappingCDA-FHIR-entete.html
    Corps d'un document:
        Modèle logique métier: StructureDefinition-fr-lm-corps-document.html
        CDA: new-tab https://interop.esante.gouv.fr/ig/cda/document-core/ressourcesCDA-corps.html
        FHIR: new-tab https://interop.esante.gouv.fr/ig/fhir/document-core/ressourcesFHIR-corps.html
        Mapping Métier/CDA/FHIR: mappingCDA-FHIR-corps.html
    Ressources de conformité: artifacts.html
    Autres ressources:
        "Espace de publication du CI-SIS": new-tab https://esante.gouv.fr/offres-services/ci-sis/espace-publication
        "Serveur Multi-terminologies": new-tab https://smt.esante.gouv.fr/
        "Serveur Multi-terminologies / FHIR": new-tab https://smt.esante.gouv.fr/fhir
        "IG terminologies et jeux de valeurs du CI-SIS": new-tab https://ansforge.github.io/IG-terminologie-de-sante/ig/main/index.html
        "Espace de tests du CI-SIS": new-tab https://interop.esante.gouv.fr/
        Sécurité: securite.html
        "Standard CDA": new-tab https://hl7.org/cda/stds/online-navigation/index.html
        "Standard FHIR": new-tab https://hl7.org/fhir/R4/index.html
        "Documentation des guides d'implémentation de l'ANS": new-tab https://interop.esante.gouv.fr/ig/documentation/index.html
        Téléchargements et usage: downloads.html

